name: Sync to Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check commit message for [sync]
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "trigger=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          MSG="${{ github.event.head_commit.message }}"
          echo "Commit: $MSG"

          if echo "$MSG" | grep -qE '^\[sync\]'; then
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "trigger=false" >> $GITHUB_OUTPUT
            echo "No [sync] tag. Skipping."
          fi

      - name: Dispatch to astro-base
        if: steps.check.outputs.trigger == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ASTRO_REPO_PAT }}
          repository: ak0r/memocho
          event-type: vault-sync
          client-payload: |
            {
              "sha": "${{ github.sha }}"
            }
