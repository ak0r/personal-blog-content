# ─────────────────────────────────────────────────────────────────────────────
# Site Configuration
# ─────────────────────────────────────────────────────────────────────────────
# This file lives alongside your content in your Obsidian vault.
# Only include the fields you want to override.
# Defaults are defined in src/config/site.config.ts
# ─────────────────────────────────────────────────────────────────────────────

# ── Site identity ─────────────────────────────────────────────────────────────
- id: config
  title: Base
  description: A field notebook, kept in the open
  url: https://base.pages.dev  # ← replace with your domain
  locale: en

  # ── Author ────────────────────────────────────────────────────────────────────

  author:
    name: The Localhost Studio           # ← replace
    bio: A short line about who you are and what you write about.
    url: https://example.com  # ← replace
    # avatar: /images/avatar.jpg

  # ── Assets ───────────────────────────────────────────────────────────────────
  # Uncomment to use a logo or custom OG image.
  # Paths are relative to /public

  # logo: /images/logo.svg
  # ogImage: /images/og-default.jpg

  # ── Navigation ────────────────────────────────────────────────────────────────
  # Top navigation links. Order here is order in the nav bar.

  navigation:
    - title: Articles
      url: /posts
    - title: Notes
      url: /notes

  # ── Footer links ──────────────────────────────────────────────────────────────

  footerLinks:
    - title: About
      url: /about
    - title: Now
      url: /now
    - title: Colophon
      url: /colophon

  # ── Social ────────────────────────────────────────────────────────────────────
  # Supported icons: github, mastodon, twitter, rss, email

  social:
    - title: GitHub
      url: https://github.com/thelocalhoststudio
      icon: github
    # - title: Mastodon
    #   url: https://mastodon.social/@username  # ← replace or remove
    #   icon: mastodon
    - title: RSS
      url: /rss.xml
      icon: rss

  # ── Content display ───────────────────────────────────────────────────────────

  # Shown as the opening line on the garden homepage
  heroText: Notes, observations, and the occasional long read.  # ← replace

  # Shown in the footer (optional — remove the line to hide)
  footerCredits: "Copyright Base"  # ← replace with your tagline, or delete this line

  # Number of posts shown per archive page
  postsPerPage: 8

  # Number of recent entries shown on the homepage
  recentPosts: 4

  # ── Flags ─────────────────────────────────────────────────────────────────────

  # Set to true if you have a logo defined above
  showLogo: false

  # ── Browse ────────────────────────────────────────────────────────────────────
  # Generic index pages built from an optional `meta` object in post/note
  # frontmatter. Each entry below turns `meta.<key>` into a browsable
  # dimension at /browse/<slug>. Unconfigured meta keys are ignored.

  browse:
    dimensions:
      - key: published
        slug: years
        title: Years

      - key: category
        slug: categories
        title: Categories

      - key: tags
        slug: tags
        title: Tags

      - key: trip
        slug: trips
        title: Trips

      - key: place
        slug: places
        title: Places